name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: JS syntax check — validate inline script
        run: |
          node -e "const fs=require('fs'),h=fs.readFileSync('index.html','utf8'),m=h.match(/<script>([\\s\\S]*?)<\\/script>/);if(!m){console.error('No script found');process.exit(1);}fs.writeFileSync('/tmp/beta_check.js',m[1]);"
          node --check /tmp/beta_check.js
          echo "✓ Beta app JS syntax check passed"

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_TREE_064BD630F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: ""

      - name: Smoke test — verify app renders
        run: |
          echo "Waiting for CDN propagation..."
          sleep 25
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" https://beta.solvaltinsights.com/)
          if [ "$HTTP" != "200" ]; then
            echo "✗ HTTP $HTTP — expected 200"
            exit 1
          fi
          BODY=$(curl -s https://beta.solvaltinsights.com/)
          if echo "$BODY" | grep -qi "solvalt"; then
            echo "✓ Beta app render check passed"
          else
            echo "✗ Render check FAILED — response missing expected content"
            echo "Response snippet: $(echo $BODY | head -c 500)"
            exit 1
          fi

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_TREE_064BD630F }}
          action: "close"
